<style>
  body {
    margin: 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f2; /* off-white */
    color: #1a1a1a; /* dark grey */
    line-height: 1.6;
    overflow-x: hidden;
  }

  .container {
    max-width: 900px;
    margin: auto;
    padding: 80px 20px;
  }

  h1 {
    font-size: 3rem;
    letter-spacing: 1px;
    margin-bottom: 20px;
    color: #111;
  }

  h2 {
    margin-top: 100px;
    font-size: 0.9rem;
    letter-spacing: 2px;
    color: #888; /* light grey */
  }

  p {
    font-size: 1rem;
    max-width: 650px;
    color: #444; /* mid grey */
  }

  .hero {
    padding-top: 140px;
  }

  .tagline {
    font-size: 1.2rem;
    color: #222;
    margin-bottom: 20px;
  }

  ul {
    margin-top: 20px;
    padding-left: 20px;
  }

  li {
    margin-bottom: 10px;
    color: #444;
  }

  .footer {
    margin-top: 120px;
    font-size: 0.8rem;
    color: #999;
  }

  a {
    color: #555;
    text-decoration: none;
  }

  a:hover {
    color: #000;
  }

  /* subtle paper grain effect */
  body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.01),
      rgba(0,0,0,0.01) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }

  /* softer cursor */
  .cursor::after {
    content: "_";
    animation: blink 1.2s infinite;
    color: #aaa;
  }

  @keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
  }
</style>
